# Blueprint Render – Plateforme Excursion OCP
# Déploiement : base PostgreSQL + backend (API) + frontend (Next.js)
# Voir DEPLOIEMENT_RENDER.md pour les étapes et variables à renseigner.

databases:
  - name: plateforme-excursion-db
    databaseName: excursionocp
    plan: free

services:
  # API Backend (Express + Prisma)
  - type: web
    name: plateforme-excursion-backend
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: plateforme-excursion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # À renseigner après déploiement : URL du frontend (ex. https://plateforme-excursion-frontend.onrender.com)
      - key: CORS_ORIGIN
        sync: false

  # Frontend Next.js
  - type: web
    name: plateforme-excursion-frontend
    runtime: node
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      # À renseigner après déploiement : URL du backend (ex. https://plateforme-excursion-backend.onrender.com)
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
